global:
  acrLoginServer: aegisacraswin.azurecr.io
  imageTag: latest
  imagePullPolicy: Always

namespace:
  name: aegis-dev

workloadIdentity:
  serviceAccountName: aegis-workload-identity
  clientId: “2867ba3d-6959-4bcb-8a45-e7b370b5bd97”

keyVault:
  name: aegis-kv-2026
  tenantId: "3076b773-f5d9-413e-9564-7deaa3d0d7b7"

secretProviderClassName: aegis-kv-secret-provider
secretName: aegis-kv-secrets

secrets:
  - kvName: kv-mongodb-uri
    key: MONGODB_URI
  - kvName: kv-jwt-secret
    key: JWT_SECRET
  - kvName: kv-postgres-url
    key: DATABASE_URL
  - kvName: kv-postgres-password
    key: POSTGRES_PASSWORD
  - kvName: kv-azure-storage-conn
    key: AZURE_STORAGE_CONNECTION_STRING
  - kvName: kv-gemini-api-key
    key: GEMINI_API_KEY
  - kvName: kv-azure-ai-endpoint
    key: AZURE_AI_ENDPOINT
  - kvName: kv-azure-ai-key
    key: AZURE_AI_KEY
  - kvName: kv-appinsights-conn
    key: APPLICATIONINSIGHTS_CONNECTION_STRING

config:
  PORT: "5000"
  HEALTH_RECORDS_SERVICE_URL: "http://health-records-service:5001"
  MEDICATION_SERVICE_URL: "http://medication-service:5002"
  AI_SERVICE_URL: "http://ai-service:5003"
  IMAGING_SERVICE_URL: "http://imaging-service:5004"
  DIAGNOSTICS_SERVICE_URL: "http://diagnostic-agent-service:5005"
  COORDINATOR_AGENT_URL: "http://coordinator-agent:8000"
  IMAGE_ANALYSIS_AGENT_URL: "http://image-analysis-agent:8001"
  PATIENT_HISTORY_AGENT_URL: "http://patient-history-agent:8002"
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  CORS_ORIGIN: “*”

postgres:
  enabled: true
  image: postgres:15-alpine
  serviceName: postgres-service
  db: imaging
  user: aegis
  storageClass: managed-csi
  storageSize: 5Gi
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits: { cpu: “500m”, memory: “512Mi” }

backendDefaults:
  resources:
    requests: { cpu: "100m", memory: "192Mi" }
    limits: { cpu: “500m”, memory: “512Mi” }

# node services expose /healthz; python/fastapi services expose /health
services:
  - name: api-gateway
    serviceName: api-gateway-service
    image: api-gateway
    port: 5000
    replicas: 1
    healthPath: /healthz
    resources:
      requests: { cpu: "100m", memory: "192Mi" }
      limits: { cpu: "500m", memory: "512Mi" }
    hpa:
      enabled: false
      minReplicas: 2
      maxReplicas: 5
      cpuUtilization: 70
      memoryUtilization: 80

  - name: health-records-service
    image: health-records-service
    port: 5001
    replicas: 1
    healthPath: /healthz
    hpa:
      enabled: false
      minReplicas: 2
      maxReplicas: 5
      cpuUtilization: 70
      memoryUtilization: 80

  - name: medication-service
    image: medication-service
    port: 5002
    replicas: 1
    healthPath: /healthz
    hpa:
      enabled: false
      minReplicas: 2
      maxReplicas: 4
      cpuUtilization: 70
      memoryUtilization: 80

  - name: ai-service
    image: ai-service
    port: 5003
    replicas: 1
    healthPath: /healthz
    hpa:
      enabled: false
      minReplicas: 2
      maxReplicas: 5
      cpuUtilization: 70
      memoryUtilization: 80

  - name: imaging-service
    image: imaging-service
    port: 5004
    replicas: 1
    healthPath: /health
    hpa:
      enabled: false
      minReplicas: 2
      maxReplicas: 5
      cpuUtilization: 70
      memoryUtilization: 80

  - name: diagnostic-agent-service
    image: diagnostic-agent-service
    port: 5005
    replicas: 1
    healthPath: /health
    hpa:
      enabled: false
      minReplicas: 2
      maxReplicas: 5
      cpuUtilization: 70
      memoryUtilization: 80

  - name: coordinator-agent
    image: coordinator-agent
    port: 8000
    replicas: 1
    healthPath: /health
    identityPath: /identity
    hpa:
      enabled: false
      minReplicas: 2
      maxReplicas: 5
      cpuUtilization: 70
      memoryUtilization: 80

  - name: image-analysis-agent
    image: image-analysis-agent
    port: 8001
    replicas: 1
    healthPath: /health
    hpa:
      enabled: false
      minReplicas: 2
      maxReplicas: 5
      cpuUtilization: 70
      memoryUtilization: 80

  - name: patient-history-agent
    image: patient-history-agent
    port: 8002
    replicas: 1
    healthPath: /health
    hpa:
      enabled: false
      minReplicas: 2
      maxReplicas: 5
      cpuUtilization: 70
      memoryUtilization: 80

  # no HTTP port; exec probe checks process is alive
  - name: notification-worker
    image: notification-worker
    replicas: 1
    worker: true
    resources:
      requests: { cpu: "100m", memory: "128Mi" }
      limits: { cpu: "300m", memory: "256Mi" }
    execProbe:
      command: ["pgrep", "-f", "node"]
      readinessInitialDelay: 15
      livenessInitialDelay: 30
    hpa:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      cpuUtilization: 70

frontend:
  enabled: true
  name: client
  serviceName: client-service
  image: client
  port: 80
  replicas: 1
  healthPath: /healthz
  resources:
    requests: { cpu: “100m”, memory: “128Mi” }
    limits: { cpu: “300m”, memory: “256Mi” }
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    cpuUtilization: 60

ingress:
  enabled: true
  host: ageis-dev.b4n3xus.in
  apiBackend:
    name: api-gateway-service
    port: 5000

gateway:
  enabled: false
  className: kgateway
  name: aegis-gateway
  listenerPort: 80
  apiBackend:
    name: api-gateway-service
    port: 5000

