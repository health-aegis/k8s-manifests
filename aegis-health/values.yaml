# ─── Aegis Health — Helm values ───────────────────────────────────────────────
# Helmified version of the k8s/ manifests, targeting AKS with:
#   - Azure Key Vault CSI secrets provider (Workload Identity)
#   - Azure Container Registry images
#   - KGateway (Gateway API) ingress
#   - In-cluster PostgreSQL; MongoDB provided externally by Cosmos DB (via KV secret)
#
# Values marked "set at deploy time" come from Terraform outputs — pass with
#   helm upgrade --install ... --set <key>=<value>
# (see helm/README.md).

global:
  # ACR login server, e.g. aegisacraswin.azurecr.io (acr_name in terraform.tfvars)
  acrLoginServer: aegisacraswin.azurecr.io
  imageTag: latest
  imagePullPolicy: Always

namespace:
  # The chart deploys into the release namespace (helm -n aegis ...).
  # Set createNamespace via `helm install --create-namespace`.
  name: aegis

# ─── Azure Workload Identity ─────────────────────────────────────────────────
workloadIdentity:
  serviceAccountName: aegis-workload-identity
  clientId: "2867ba3d-6959-4bcb-8a45-e7b370b5bd97"

# ─── Azure Key Vault (CSI Secrets Provider) ──────────────────────────────────
keyVault:
  name: aegis-kv-2026
  tenantId: "3076b773-f5d9-413e-9564-7deaa3d0d7b7"

# Name of the SecretProviderClass and the K8s Secret it syncs into.
secretProviderClassName: aegis-kv-secret-provider
secretName: aegis-kv-secrets

# KV object name -> K8s Secret key. Drives both the CSI `objects` array and the
# synced `secretObjects`. Must match the secret names created in Terraform main.tf.
secrets:
  - kvName: kv-mongodb-uri
    key: MONGODB_URI
  - kvName: kv-jwt-secret
    key: JWT_SECRET
  - kvName: kv-postgres-url
    key: DATABASE_URL
  - kvName: kv-postgres-password
    key: POSTGRES_PASSWORD
  - kvName: kv-azure-storage-conn
    key: AZURE_STORAGE_CONNECTION_STRING
  - kvName: kv-gemini-api-key
    key: GEMINI_API_KEY
  - kvName: kv-azure-ai-endpoint
    key: AZURE_AI_ENDPOINT
  - kvName: kv-azure-ai-key
    key: AZURE_AI_KEY
  - kvName: kv-appinsights-conn
    key: APPLICATIONINSIGHTS_CONNECTION_STRING

# ─── Non-secret configuration (ConfigMap: aegis-config) ──────────────────────
config:
  PORT: "5000"
  HEALTH_RECORDS_SERVICE_URL: "http://health-records-service:5001"
  MEDICATION_SERVICE_URL: "http://medication-service:5002"
  AI_SERVICE_URL: "http://ai-service:5003"
  IMAGING_SERVICE_URL: "http://imaging-service:5004"
  DIAGNOSTICS_SERVICE_URL: "http://diagnostic-agent-service:5005"
  COORDINATOR_AGENT_URL: "http://coordinator-agent:8000"
  IMAGE_ANALYSIS_AGENT_URL: "http://image-analysis-agent:8001"
  PATIENT_HISTORY_AGENT_URL: "http://patient-history-agent:8002"
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  CORS_ORIGIN: "*"

# ─── In-cluster PostgreSQL (imaging-service metadata) ────────────────────────
postgres:
  enabled: true
  image: postgres:15-alpine
  serviceName: postgres-service
  db: imaging
  user: aegis
  # Password is read from the KV-synced secret key POSTGRES_PASSWORD.
  storageClass: managed-csi
  storageSize: 5Gi
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits: { cpu: "500m", memory: "512Mi" }

# ─── Backend microservices ───────────────────────────────────────────────────
# All share: Workload Identity SA, CSI secrets volume, envFrom (secret+config).
# `runtime` is informational (node => /healthz, python => /health).
backendDefaults:
  resources:
    requests: { cpu: "100m", memory: "192Mi" }
    limits: { cpu: "500m", memory: "512Mi" }

services:
  - name: api-gateway
    serviceName: api-gateway-service
    image: api-gateway
    port: 5000
    replicas: 1
    healthPath: /healthz
    resources:
      requests: { cpu: "50m", memory: "128Mi" }
      limits: { cpu: "300m", memory: "512Mi" }

  - name: health-records-service
    image: health-records-service
    port: 5001
    replicas: 1
    healthPath: /healthz

  - name: medication-service
    image: medication-service
    port: 5002
    replicas: 1
    healthPath: /healthz

  - name: ai-service
    image: ai-service
    port: 5003
    replicas: 1
    healthPath: /healthz

  - name: imaging-service
    image: imaging-service
    port: 5004
    replicas: 1
    healthPath: /health

  - name: diagnostic-agent-service
    image: diagnostic-agent-service
    port: 5005
    replicas: 1
    healthPath: /health

  - name: coordinator-agent
    image: coordinator-agent
    port: 8000
    replicas: 1
    healthPath: /health
    identityPath: /identity   # workload identity verification endpoint

  - name: image-analysis-agent
    image: image-analysis-agent
    port: 8001
    replicas: 1
    healthPath: /health

  - name: patient-history-agent
    image: patient-history-agent
    port: 8002
    replicas: 1
    healthPath: /health

  # Background worker — no port, no Service, no probes.
  - name: notification-worker
    image: notification-worker
    replicas: 1
    worker: true
    resources:
      requests: { cpu: "50m", memory: "128Mi" }
      limits: { cpu: "250m", memory: "256Mi" }

# ─── React frontend (nginx static) ───────────────────────────────────────────
frontend:
  enabled: true
  name: client
  serviceName: client-service
  image: client
  port: 80
  replicas: 1
  healthPath: /healthz
  resources:
    requests: { cpu: "20m", memory: "64Mi" }
    limits: { cpu: "100m", memory: "128Mi" }

# ─── AGIC Ingress (Application Gateway Ingress Controller) ───────────────────
ingress:
  enabled: true
  apiBackend:
    name: api-gateway-service
    port: 5000

# ─── KGateway (Gateway API) ───────────────────────────────────────────────────
gateway:
  enabled: false
  className: kgateway
  name: aegis-gateway
  listenerPort: 80
  # Backend for the /api prefix route (the api-gateway Service).
  apiBackend:
    name: api-gateway-service
    port: 5000
