# ─── Workload Identity ServiceAccount ─────────────────────────────────────────
# All pods authenticate to Azure Key Vault via OIDC federation using this SA.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.workloadIdentity.serviceAccountName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    azure.workload.identity/client-id: {{ .Values.workloadIdentity.clientId | quote }}
  labels:
    azure.workload.identity/use: "true"
    {{- include "aegis.labels" . | nindent 4 }}
