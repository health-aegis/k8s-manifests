{{- $root := . -}}
{{- range .Values.services }}
{{- $svcName  := .serviceName | default .name }}
{{- $resources := .resources | default $root.Values.backendDefaults.resources }}
{{- $imageTag  := index $root.Values.imageTags .name | default $root.Values.global.imageTag }}
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ .name }}
  namespace: {{ $root.Release.Namespace }}
  labels:
    app: {{ .name }}
    {{- include "aegis.labels" $root | nindent 4 }}
spec:
  replicas: {{ .replicas | default 1 }}
  selector:
    matchLabels:
      app: {{ .name }}
  strategy:
    canary:
      steps:
        - setWeight: 20
        - pause:
            duration: 30s
        - setWeight: 50
        - pause:
            duration: 30s
  template:
    metadata:
      annotations:
        rollme: {{ $imageTag | quote }}
      labels:
        app: {{ .name }}
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: {{ $root.Values.workloadIdentity.serviceAccountName }}
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ $root.Values.secretProviderClassName }}
      containers:
        - name: {{ .name }}
          image: {{ $root.Values.global.acrLoginServer }}/{{ .image }}:{{ $imageTag }}
          imagePullPolicy: {{ $root.Values.global.imagePullPolicy }}
          {{- if not .worker }}
          ports:
            - containerPort: {{ .port }}
              name: http
          {{- end }}
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
          {{- include "aegis.envFrom" $root | nindent 10 }}
          {{- if .port }}
          env:
            - name: PORT
              value: {{ .port | quote }}
          {{- end }}
          {{- if and (not .worker) .healthPath }}
          readinessProbe:
            httpGet:
              path: {{ .healthPath }}
              port: {{ .port }}
            initialDelaySeconds: 10
            periodSeconds: 8
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: {{ .healthPath }}
              port: {{ .port }}
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          {{- else if .execProbe }}
          readinessProbe:
            exec:
              command: {{ toJson .execProbe.command }}
            initialDelaySeconds: {{ .execProbe.readinessInitialDelay | default 15 }}
            periodSeconds: 20
            failureThreshold: 3
          livenessProbe:
            exec:
              command: {{ toJson .execProbe.command }}
            initialDelaySeconds: {{ .execProbe.livenessInitialDelay | default 30 }}
            periodSeconds: 30
            failureThreshold: 3
          {{- end }}
          resources:
            {{- toYaml $resources | nindent 12 }}
{{- if not .worker }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $svcName }}
  namespace: {{ $root.Release.Namespace }}
  labels:
    app: {{ .name }}
    {{- include "aegis.labels" $root | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ .name }}
  ports:
    - port: {{ .port }}
      targetPort: {{ .port }}
      name: http
{{- end }}
{{- end }}
