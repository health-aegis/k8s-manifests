# ─── Azure Key Vault CSI SecretProviderClass ──────────────────────────────────
# Syncs secrets from Azure Key Vault → K8s Secret (.Values.secretName).
# The synced Secret is created when a pod first mounts the CSI volume.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Values.secretProviderClassName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aegis.labels" . | nindent 4 }}
spec:
  provider: azure
  secretObjects:
    - secretName: {{ .Values.secretName }}
      type: Opaque
      data:
        {{- range .Values.secrets }}
        - objectName: {{ .kvName }}
          key: {{ .key }}
        {{- end }}
  parameters:
    usePodIdentity: "false"
    clientID: {{ .Values.workloadIdentity.clientId | quote }}
    keyvaultName: {{ .Values.keyVault.name | quote }}
    cloudName: ""
    tenantId: {{ .Values.keyVault.tenantId | quote }}
    objects: |
      array:
        {{- range .Values.secrets }}
        - |
          objectName: {{ .kvName }}
          objectType: secret
        {{- end }}
