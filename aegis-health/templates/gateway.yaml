{{- if .Values.gateway.enabled }}
# ─── KGateway (Gateway API) — edge entrypoint ─────────────────────────────────
# Creates an Azure LoadBalancer. /api -> api-gateway, /* -> client (SPA).
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: "/healthz/ready"
  labels:
    {{- include "aegis.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
    - name: http
      protocol: HTTP
      port: {{ .Values.gateway.listenerPort }}
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: aegis-api-route
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aegis.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Release.Namespace }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: {{ .Values.gateway.apiBackend.name }}
          port: {{ .Values.gateway.apiBackend.port }}
          weight: 1
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: X-Served-By
                value: aegis-api-gateway
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: aegis-frontend-route
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aegis.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Release.Namespace }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Values.frontend.serviceName }}
          port: {{ .Values.frontend.port }}
          weight: 1
{{- end }}
