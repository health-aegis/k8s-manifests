# ──────────────────────────────────────────────────────────────────────
# PROD environment values — aegis-prod namespace.
# Key services run ≥ 2 replicas with HPA enabled.
# Resources meet spec: CPU req ≥100m, limit ≤500m; mem req ≥128Mi, limit ≤512Mi.
# ──────────────────────────────────────────────────────────────────────

# ── Shared infrastructure ──────────────────────────────────────────────
workloadIdentity:
  clientId: "" # set after prod terraform apply
keyVault:
  name: aegis-kv-prod
  tenantId: "3076b773-f5d9-413e-9564-7deaa3d0d7b7"
  secrets:
    - kvName: kv-mongodb-uri
      key: MONGODB_URI
    - kvName: kv-jwt-secret
      key: JWT_SECRET
    - kvName: kv-postgres-url
      key: DATABASE_URL
    - kvName: kv-postgres-password
      key: POSTGRES_PASSWORD
    - kvName: kv-azure-storage-conn
      key: AZURE_STORAGE_CONNECTION_STRING
    - kvName: kv-gemini-api-key
      key: GEMINI_API_KEY
    - kvName: kv-azure-ai-endpoint
      key: AZURE_AI_ENDPOINT
    - kvName: kv-azure-ai-key
      key: AZURE_AI_KEY
    - kvName: kv-appinsights-conn
      key: APPLICATIONINSIGHTS_CONNECTION_STRING
config:
  PORT: "5000"
  HEALTH_RECORDS_SERVICE_URL: "http://health-records-service:5001"
  MEDICATION_SERVICE_URL: "http://medication-service:5002"
  AI_SERVICE_URL: "http://ai-service:5003"
  IMAGING_SERVICE_URL: "http://imaging-service:5004"
  DIAGNOSTICS_SERVICE_URL: "http://diagnostic-agent-service:5005"
  COORDINATOR_AGENT_URL: "http://coordinator-agent:8000"
  IMAGE_ANALYSIS_AGENT_URL: "http://image-analysis-agent:8001"
  PATIENT_HISTORY_AGENT_URL: "http://patient-history-agent:8002"
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  CORS_ORIGIN: "*"
ingress:
  enabled: true
  host: ageis-prod.b4n3xus.in
