{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-netpol
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "api-gateway.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "api-gateway.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
        - ipBlock:
            cidr: {{ .Values.networkPolicy.appGatewaySubnetCidr | default "10.1.30.0/24" }}
      ports:
        - protocol: TCP
          port: 5000
  egress:
    - {}
{{- end }}
