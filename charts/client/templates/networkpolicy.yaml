{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: client-netpol
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "client.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "client.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
        - ipBlock:
            cidr: {{ .Values.networkPolicy.appGatewaySubnetCidr | default "10.1.30.0/24" }}
      ports:
        - protocol: TCP
          port: 80
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
      ports:
        - protocol: TCP
          port: 5000
    - to: []
      ports:
        - protocol: UDP
          port: 53
{{- end }}
