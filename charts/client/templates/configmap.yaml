apiVersion: v1
kind: ConfigMap
metadata:
  name: client-nginx-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "client.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 8080;
        server_name _;

        resolver kube-dns.kube-system.svc.cluster.local valid=30s ipv6=off;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        set $backend http://{{ .Values.nginx.apiBackendService }}:{{ .Values.nginx.apiBackendPort }};

        location /api/ {
            proxy_pass         $backend/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
            proxy_read_timeout 120s;
        }

        location /socket.io/ {
            proxy_pass         $backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        location /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html { root /usr/share/nginx/html; }
    }
