apiVersion: v1
kind: Service
metadata:
  name: medication-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "medication-service.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "medication-service.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
