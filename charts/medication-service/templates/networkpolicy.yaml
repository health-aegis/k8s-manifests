{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: medication-service-netpol
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "medication-service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "medication-service.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
        - ipBlock:
            cidr: {{ .Values.networkPolicy.appGatewaySubnetCidr | default "10.1.30.0/24" }}
      ports:
        - protocol: TCP
          port: 5002
  egress:
    - {}
{{- end }}
