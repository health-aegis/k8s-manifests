{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: image-analysis-agent-netpol
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "image-analysis-agent.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "image-analysis-agent.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: coordinator-agent
      ports:
        - protocol: TCP
          port: 8001
  egress:
    - {}
{{- end }}
