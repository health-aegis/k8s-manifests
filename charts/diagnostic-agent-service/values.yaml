replicaCount: 1

image:
  acrLoginServer: aegisacraswin.azurecr.io
  repository: diagnostic-agent-service
  pullPolicy: Always
  tag: "latest"

service:
  type: ClusterIP
  port: 5005
  targetPort: 5005

resources:
  requests:
    cpu: 100m
    memory: 192Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  cpuUtilization: 70
  memoryUtilization: 80

probes:
  readiness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 8
    timeoutSeconds: 3
    failureThreshold: 3
  liveness:
    path: /health
    initialDelaySeconds: 20
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3

env:
  PORT: "5005"
  NODE_ENV: production

secrets:
  providerClassName: aegis-kv-secret-provider
  kvSecretName: aegis-kv-secrets

configMap:
  name: aegis-config

serviceAccount:
  name: aegis-workload-identity

networkPolicy:
  enabled: true
