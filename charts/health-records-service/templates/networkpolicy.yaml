{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: health-records-service-netpol
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "health-records-service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "health-records-service.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
      ports:
        - protocol: TCP
          port: 5001
  egress:
    - {}
{{- end }}
