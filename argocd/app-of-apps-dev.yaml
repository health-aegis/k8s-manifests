apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aegis-dev
  namespace: argocd
  labels:
    env: dev
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/health-aegis/health-aegis.git
    targetRevision: HEAD
    path: helm/environments/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: aegis-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
