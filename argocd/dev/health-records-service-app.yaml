apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: health-records-service-dev
  namespace: argocd
  labels:
    env: dev
    app: health-records-service
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/health-aegis/k8s-manifests.git
    targetRevision: HEAD
    path: charts/health-records-service
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: aegis-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
