apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: client-dev
  namespace: argocd
  labels:
    env: dev
    app: client
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/health-aegis/health-aegis.git
    targetRevision: HEAD
    path: helm/charts/client
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: aegis-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
